name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edu_portal
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: edu_portal_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://edu_portal:changeme@localhost:5432/edu_portal_db?schema=public
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 4
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PORT: 587
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASS: ${{ secrets.MAIL_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter @edu-portal/api lint

      - name: Lint Web
        run: pnpm --filter @edu-portal/web lint

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate

      - name: Run migrations
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy

      - name: Test API
        run: pnpm --filter @edu-portal/api test

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f apps/api/Dockerfile -t edu-portal-api .

      - name: Build Web image
        run: docker build -f apps/web/Dockerfile -t edu-portal-web .
