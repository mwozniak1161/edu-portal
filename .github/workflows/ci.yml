name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: edu_portal
          POSTGRES_PASSWORD: changeme
          POSTGRES_DB: edu_portal_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://edu_portal:changeme@localhost:5432/edu_portal_db?schema=public
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 4
      MAIL_HOST: ${{ secrets.MAIL_HOST }}
      MAIL_PORT: 587
      MAIL_USER: ${{ secrets.MAIL_USER }}
      MAIL_PASS: ${{ secrets.MAIL_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate

      # TODO: replace with proper ESLint lint once .eslintrc is configured per app
      - name: Type-check API (temporary — no ESLint config exists yet)
        working-directory: apps/api
        run: pnpm exec tsc --noEmit

      - name: Type-check Web (temporary — no ESLint config exists yet)
        working-directory: apps/web
        run: pnpm exec tsc --noEmit

      - name: Run migrations
        working-directory: apps/api
        run: pnpm exec prisma migrate deploy

      - name: Test API
        run: pnpm --filter @edu-portal/api test

  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    # Only deploy on push to master (not on PRs), and only if lint+tests pass
    needs: lint-and-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: edu-portal-api
          SHA: ${{ github.sha }}
        run: |
          docker build -f apps/api/Dockerfile -t $REGISTRY/$REPO:latest -t $REGISTRY/$REPO:$SHA .
          docker push $REGISTRY/$REPO:latest
          docker push $REGISTRY/$REPO:$SHA

      - name: Build & push Web image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPO: edu-portal-web
          SHA: ${{ github.sha }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_DEMO_ENABLED: ${{ secrets.NEXT_PUBLIC_DEMO_ENABLED }}
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL \
            --build-arg NEXT_PUBLIC_DEMO_ENABLED=$NEXT_PUBLIC_DEMO_ENABLED \
            -t $REGISTRY/$REPO:latest \
            -t $REGISTRY/$REPO:$SHA .
          docker push $REGISTRY/$REPO:latest
          docker push $REGISTRY/$REPO:$SHA

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.prod.yml,nginx/nginx.conf"
          target: /home/ec2-user/app

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          MAIL_HOST: ${{ secrets.MAIL_HOST }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          ECR_API_URL: ${{ secrets.ECR_API_URL }}
          ECR_WEB_URL: ${{ secrets.ECR_WEB_URL }}
          AWS_REGION_NAME: ${{ secrets.AWS_REGION }}
          DEMO_ENABLED: ${{ secrets.DEMO_ENABLED }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,JWT_SECRET,CORS_ORIGIN,MAIL_HOST,MAIL_USER,MAIL_PASS,MAIL_FROM,ECR_API_URL,ECR_WEB_URL,AWS_REGION_NAME,DEMO_ENABLED
          script: |
            set -e
            cd /home/ec2-user/app

            # Write .env — values passed as env vars (not interpolated inline)
            # This avoids shell injection from special characters in secrets
            printf 'POSTGRES_USER=%s\n' "$POSTGRES_USER" > .env
            printf 'POSTGRES_PASSWORD=%s\n' "$POSTGRES_PASSWORD" >> .env
            printf 'POSTGRES_DB=%s\n' "$POSTGRES_DB" >> .env
            printf 'JWT_SECRET=%s\n' "$JWT_SECRET" >> .env
            printf 'JWT_ACCESS_EXPIRES_IN=15m\n' >> .env
            printf 'JWT_REFRESH_EXPIRES_IN=7d\n' >> .env
            printf 'BCRYPT_ROUNDS=12\n' >> .env
            printf 'CORS_ORIGIN=%s\n' "$CORS_ORIGIN" >> .env
            printf 'MAIL_HOST=%s\n' "$MAIL_HOST" >> .env
            printf 'MAIL_PORT=587\n' >> .env
            printf 'MAIL_USER=%s\n' "$MAIL_USER" >> .env
            printf 'MAIL_PASS=%s\n' "$MAIL_PASS" >> .env
            printf 'MAIL_FROM=%s\n' "$MAIL_FROM" >> .env
            printf 'ECR_API_URL=%s\n' "$ECR_API_URL" >> .env
            printf 'ECR_WEB_URL=%s\n' "$ECR_WEB_URL" >> .env
            printf 'DEMO_ENABLED=%s\n' "$DEMO_ENABLED" >> .env

            # Login to ECR from EC2 (uses instance IAM role — no credentials needed)
            aws ecr get-login-password --region "$AWS_REGION_NAME" \
              | docker login --username AWS --password-stdin "$ECR_API_URL"

            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f
