# Production docker-compose — used on EC2.
# Images are pulled from ECR, not built locally.
# nginx sits in front and routes traffic on ports 80 (redirect) and 443 (SSL).

services:
  postgres:
    image: postgres:16-alpine
    container_name: edu-portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  api:
    image: ${ECR_API_URL}:latest
    container_name: edu-portal-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      CORS_ORIGIN: ${CORS_ORIGIN}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      MAIL_FROM: ${MAIL_FROM}
      PORT: 3000
      DEMO_ENABLED: ${DEMO_ENABLED:-false}
      GH_WEBHOOK_SECRET: ${GH_WEBHOOK_SECRET}
      GH_TOKEN: ${GH_TOKEN}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  web:
    image: ${ECR_WEB_URL}:latest
    container_name: edu-portal-web
    restart: unless-stopped
    depends_on:
      - api
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: edu-portal-nginx
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
