<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font/sans.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font/mono.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-container": "#dad7ff",
                    "tertiary": "#7e3000",
                    "inverse-on-surface": "#eaf1ff",
                    "on-secondary-fixed-variant": "#413f82",
                    "surface": "#f8f9ff",
                    "surface-container-high": "#dce9ff",
                    "surface-dim": "#cbdbf5",
                    "outline": "#777587",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#ffb695",
                    "surface-container": "#e5eeff",
                    "on-tertiary-container": "#ffd2be",
                    "surface-container-lowest": "#ffffff",
                    "primary-fixed-dim": "#c3c0ff",
                    "surface-tint": "#4d44e3",
                    "primary-container": "#4f46e5",
                    "surface-bright": "#f8f9ff",
                    "on-tertiary-fixed": "#351000",
                    "on-background": "#0b1c30",
                    "surface-variant": "#d3e4fe",
                    "surface-container-low": "#eff4ff",
                    "surface-container-highest": "#d3e4fe",
                    "on-surface-variant": "#464555",
                    "secondary-container": "#b6b4ff",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed": "#140f54",
                    "inverse-surface": "#213145",
                    "tertiary-fixed": "#ffdbcc",
                    "on-primary-fixed": "#0f0069",
                    "secondary-fixed-dim": "#c3c0ff",
                    "tertiary-container": "#a44100",
                    "secondary-fixed": "#e2dfff",
                    "outline-variant": "#c7c4d8",
                    "on-tertiary": "#ffffff",
                    "on-secondary-container": "#454386",
                    "inverse-primary": "#c3c0ff",
                    "primary-fixed": "#e2dfff",
                    "secondary": "#58579b",
                    "on-secondary": "#ffffff",
                    "on-primary-fixed-variant": "#3323cc",
                    "primary": "#3525cd",
                    "on-error": "#ffffff",
                    "on-surface": "#0b1c30",
                    "error": "#ba1a1a",
                    "background": "#f8f9ff",
                    "on-primary": "#ffffff",
                    "on-tertiary-fixed-variant": "#7b2f00"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "sans": ["Geist", "Inter", "sans-serif"],
                    "mono": ["Geist Mono", "monospace"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body { font-family: 'Geist', sans-serif; }
        .geist-mono { font-family: 'Geist Mono', monospace; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#f8f9ff] text-on-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary">
<!-- The Shell Visibility Rule: Navigation is suppressed for transactional login page -->
<main class="w-full max-w-sm">
<!-- Tonal Layering: Surface Container Lowest sitting on Background -->
<div class="bg-surface-container-lowest rounded-xl p-10 shadow-[0px_16px_32px_-12px_rgba(11,28,48,0.06)] border border-outline-variant/10">
<!-- Branding Section -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-surface-container-low rounded-2xl flex items-center justify-center mb-6 text-primary">
<span class="material-symbols-outlined !text-4xl" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="text-3xl font-black text-primary tracking-tighter mb-2">EduPortal</h1>
<p class="text-on-surface-variant font-sans text-sm tracking-tight">Sign in to your account</p>
</div>
<!-- Login Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Input Group: Email -->
<div>
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest mb-2 px-1" for="email">Email</label>
<div class="relative group">
<!-- Atelier Field Implementation -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary scale-y-0 group-focus-within:scale-y-100 transition-transform duration-200"></div>
<input class="w-full bg-surface-container-low border-0 border-l-2 border-transparent focus:ring-0 text-on-surface py-4 px-5 geist-mono text-sm transition-all duration-200" id="email" name="email" placeholder="admin@theatelier.edu" required="" type="email"/>
</div>
</div>
<!-- Input Group: Password -->
<div>
<div class="flex justify-between items-center mb-2 px-1">
<label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-widest" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:opacity-80 transition-opacity" href="#">Forgot?</a>
</div>
<div class="relative group">
<!-- Atelier Field Implementation -->
<div class="absolute left-0 top-0 bottom-0 w-1 bg-primary scale-y-0 group-focus-within:scale-y-100 transition-transform duration-200"></div>
<input class="w-full bg-surface-container-low border-0 border-l-2 border-transparent focus:ring-0 text-on-surface py-4 px-5 geist-mono text-sm transition-all duration-200" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
<span>Sign in</span>
<span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button><button class="w-full mt-3 border-2 border-primary/20 hover:border-primary/40 text-primary font-bold py-4 rounded-xl transition-all duration-200 active:scale-[0.98] flex items-center justify-center gap-2 bg-transparent" type="button">
<span>Enter as admin (demo)</span>
<span class="material-symbols-outlined text-lg" data-icon="admin_panel_settings">admin_panel_settings</span>
</button>
</div>
</form>
<!-- Footer Meta -->
<div class="mt-12 text-center">
<p class="text-sm text-on-surface-variant/60">
                    New to the portal? 
                    <a class="text-primary font-bold hover:underline" href="#">Contact Registrar</a>
</p>
</div>
</div>
<!-- External Visual Anchor (Decorative Image with Descriptive Prompt) -->
<div class="mt-8 text-center opacity-40">
<div class="inline-flex items-center gap-2 text-xs font-mono tracking-tighter uppercase text-on-surface-variant">
<span>The Eduportal</span>
<span class="w-1 h-1 bg-outline-variant rounded-full"></span>
<span>v4.0.2</span>
</div>
</div>
</main>
<!-- Contextual Aesthetic Element (Blurred Orb) -->
<div class="fixed -top-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed -bottom-24 -left-24 w-96 h-96 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
</body></html>
