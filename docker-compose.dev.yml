services:
  postgres:
    image: postgres:16-alpine
    container_name: edu-portal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-edu_portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-edu_portal_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edu_portal} -d ${POSTGRES_DB:-edu_portal_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: edu-portal-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - app-network

  api:
    image: node:20-alpine
    container_name: edu-portal-api-dev
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             pnpm install &&
             pnpm --filter @edu-portal/api exec prisma migrate deploy &&
             pnpm run dev:api"
    environment:
      PNPM_HOME: /root/.local/share/pnpm
      DATABASE_URL: postgresql://${POSTGRES_USER:-edu_portal}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-edu_portal_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-4}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USER: ${MAIL_USER:-dev@example.com}
      MAIL_PASS: ${MAIL_PASS:-dev-pass}
      MAIL_FROM: ${MAIL_FROM:-EduPortal <dev@example.com>}
      DEMO_ENABLED: ${DEMO_ENABLED:-false}
      PORT: 3000
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - api_dist:/app/apps/api/dist
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  web:
    image: node:20-alpine
    container_name: edu-portal-web-dev
    working_dir: /app
    command: >
      sh -c "corepack enable &&
             pnpm install &&
             pnpm run dev:web"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      NEXT_PUBLIC_DEMO_ENABLED: ${NEXT_PUBLIC_DEMO_ENABLED:-false}
    ports:
      - "${WEB_PORT:-3001}:3001"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - web_next:/app/apps/web/.next
    depends_on:
      - api
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data:
  node_modules:
  api_dist:
  web_next:
